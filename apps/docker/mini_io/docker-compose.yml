services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    # Security
    security_opt:
      - no-new-privileges:true
    # read_only: true # Requires mounting a temp volume for /tmp
    # tmpfs:
    #   - /tmp
    # cap_drop:
    #   - ALL
    # Ports
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}     # Username from .env
      - MINIO_ROOT_PASSWORD=${MINIO_PASS} # Password from .env
      - GOMEMLIMIT=400MiB                 # Limit memory usage
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      replicas: 1
      labels: ["miniio"]
      resources:
        limits:
          memory: 512M
          cpus: 2

volumes:
  minio_data:


