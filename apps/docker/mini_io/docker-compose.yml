services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    # Security
    security_opt:
      - no-new-privileges:true
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASS}
      - GOMEMLIMIT=400MiB
      - VIRTUAL_HOST=minio.internal
      - VIRTUAL_PORT=9001
    volumes:
      - minio_data:/data
    networks:
      - proxy-net # Public network
    command: server /data --console-address ":9001"
    deploy:
      replicas: 1
      labels: ["miniio"]
      resources:
        limits:
          memory: 512M
          cpus: 2
volumes:
  minio_data:

networks:
  proxy-net:
    external: true